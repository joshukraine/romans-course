<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Послання до Римлян — Експозиційний курс</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-sand-50: #faf8f5;
        --color-sand-100: #f2ede6;
        --color-sand-200: #e5ddd1;
        --color-sand-300: #d4c8b5;
        --color-sand-400: #bfad94;
        --color-sand-500: #a99378;
        --color-sand-600: #8a7460;
        --color-sand-700: #6e5c4e;
        --color-sand-800: #574a40;
        --color-sand-900: #3e3530;

        --color-sky-blue-50: #f0f5fa;
        --color-sky-blue-100: #dce8f2;
        --color-sky-blue-200: #b8d0e5;
        --color-sky-blue-300: #8db3d4;
        --color-sky-blue-400: #6896c0;
        --color-sky-blue-500: #4a7aa8;
        --color-sky-blue-600: #3b6189;
        --color-sky-blue-700: #2f4e6e;
        --color-sky-blue-800: #253d57;
        --color-sky-blue-900: #1c2e42;
      }

      html {
        scroll-behavior: smooth;
      }
    </style>
    <script
      src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1"
      type="module"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.3/dist/cdn.min.js"
    ></script>
    <script
      defer
      src="https://lens.euroteamoutreach.org/script.js"
      data-website-id="81aa77d9-0c13-4656-a7a6-4e8c428484f5"
    ></script>
  </head>
  <body
    class="bg-sand-50 text-sand-800"
    x-data="{
      course: {},
      units: [],
      loading: true,
      init() {
        fetch('data/course.json')
          .then(res => res.json())
          .then(data => {
            this.course = data.course;
            this.units = data.units;
            this.loading = false;
          });
      }
    }"
  >
    <main class="max-w-4xl mx-auto px-4 py-16 text-center">
      <template x-if="loading">
        <p class="text-lg text-stone-500">Завантаження...</p>
      </template>
      <template x-if="!loading">
        <div>
          <h1 class="text-4xl font-bold text-stone-900" x-text="course.title"></h1>
          <p class="mt-4 text-lg text-stone-600" x-text="course.description"></p>
          <p class="mt-8 text-sm text-stone-500">
            Розділів: <span x-text="units.length"></span> ·
            Лекцій: <span x-text="units.reduce((sum, u) => sum + u.lectures.length, 0)"></span>
          </p>
        </div>
      </template>
    </main>
  </body>
</html>
