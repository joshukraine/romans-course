<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Послання до Римлян — Експозиційний курс</title>

    <!-- Open Graph -->
    <meta property="og:title" content="Послання до Римлян — Експозиційний курс" />
    <meta
      property="og:description"
      content="Експозиційний курс з вивчення Послання до Римлян. Лекції, конспекти та тести."
    />
    <meta
      property="og:image"
      content="https://joshukraine.com/romans-course/assets/img/og-image.jpg"
    />
    <meta
      property="og:url"
      content="https://joshukraine.com/romans-course/"
    />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="uk_UA" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Послання до Римлян — Експозиційний курс"
    />
    <meta
      name="twitter:description"
      content="Експозиційний курс з вивчення Послання до Римлян. Лекції, конспекти та тести."
    />
    <meta
      name="twitter:image"
      content="https://joshukraine.com/romans-course/assets/img/og-image.jpg"
    />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-sand-50: #faf8f5;
        --color-sand-100: #f2ede6;
        --color-sand-200: #e5ddd1;
        --color-sand-300: #d4c8b5;
        --color-sand-400: #bfad94;
        --color-sand-500: #a99378;
        --color-sand-600: #8a7460;
        --color-sand-700: #6e5c4e;
        --color-sand-800: #574a40;
        --color-sand-900: #3e3530;

        --color-sky-blue-50: #f0f5fa;
        --color-sky-blue-100: #dce8f2;
        --color-sky-blue-200: #b8d0e5;
        --color-sky-blue-300: #8db3d4;
        --color-sky-blue-400: #6896c0;
        --color-sky-blue-500: #4a7aa8;
        --color-sky-blue-600: #3b6189;
        --color-sky-blue-700: #2f4e6e;
        --color-sky-blue-800: #253d57;
        --color-sky-blue-900: #1c2e42;
      }

      html {
        scroll-behavior: smooth;
      }
    </style>
    <script
      src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1"
      type="module"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.3/dist/cdn.min.js"
    ></script>
    <script
      defer
      src="https://lens.euroteamoutreach.org/script.js"
      data-website-id="81aa77d9-0c13-4656-a7a6-4e8c428484f5"
    ></script>
  </head>
  <body
    class="bg-sand-50 text-sand-800"
    x-data="{
      course: {},
      units: [],
      loading: true,
      init() {
        fetch('data/course.json')
          .then(res => res.json())
          .then(data => {
            this.course = data.course;
            this.units = data.units;
            this.loading = false;
            this.$nextTick(() => {
              const hash = window.location.hash;
              if (hash) {
                const el = document.querySelector(hash);
                if (el) el.scrollIntoView({ behavior: 'smooth' });
              }
            });
          });
      }
    }"
  >
    <!-- Navigation bar -->
    <header class="sticky top-0 z-50 bg-sand-100/95 backdrop-blur-sm shadow-sm">
      <nav
        aria-label="Global"
        class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 lg:px-8"
      >
        <a href="#" class="text-lg font-semibold text-sand-900">
          Послання до Римлян
        </a>
        <div class="flex lg:hidden">
          <button
            type="button"
            command="show-modal"
            commandfor="mobile-menu"
            class="-m-2.5 inline-flex items-center justify-center rounded-md p-2.5 text-sand-700"
          >
            <span class="sr-only">Відкрити меню</span>
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              aria-hidden="true"
              class="size-6"
            >
              <path
                d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>
        <div class="hidden lg:flex lg:gap-x-8">
          <template x-for="unit in units" :key="unit.number">
            <a
              :href="'#unit-' + unit.number"
              class="text-sm/6 font-semibold text-sand-700 hover:text-sky-blue-600"
              x-text="'Розділ ' + unit.number"
            ></a>
          </template>
        </div>
      </nav>

      <!-- Mobile menu -->
      <el-dialog>
        <dialog id="mobile-menu" class="backdrop:bg-transparent lg:hidden">
          <div tabindex="0" class="fixed inset-0 focus:outline-none">
            <el-dialog-panel
              class="fixed inset-y-0 right-0 z-50 w-full overflow-y-auto bg-sand-50 p-6 sm:max-w-sm sm:ring-1 sm:ring-sand-300"
            >
              <div class="flex items-center justify-between">
                <span class="text-lg font-semibold text-sand-900">
                  Послання до Римлян
                </span>
                <button
                  type="button"
                  command="close"
                  commandfor="mobile-menu"
                  class="-m-2.5 rounded-md p-2.5 text-sand-700"
                >
                  <span class="sr-only">Закрити меню</span>
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.5"
                    aria-hidden="true"
                    class="size-6"
                  >
                    <path
                      d="M6 18 18 6M6 6l12 12"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                  </svg>
                </button>
              </div>
              <div class="mt-6 flow-root">
                <div class="space-y-2 py-6">
                  <template x-for="unit in units" :key="unit.number">
                    <a
                      :href="'#unit-' + unit.number"
                      class="-mx-3 block rounded-lg px-3 py-2 text-base/7 font-semibold text-sand-900 hover:bg-sand-200"
                      x-text="'Розділ ' + unit.number + ': ' + unit.title"
                      @click="document.getElementById('mobile-menu').close()"
                    ></a>
                  </template>
                </div>
              </div>
            </el-dialog-panel>
          </div>
        </dialog>
      </el-dialog>
    </header>

    <!-- Hero area -->
    <section class="relative isolate overflow-hidden">
      <img
        src="assets/img/hero.jpg"
        alt="Партенон в Афінах"
        class="absolute inset-0 -z-10 size-full object-cover"
      />
      <div class="absolute inset-0 -z-10 bg-sand-900/60"></div>
      <div class="mx-auto max-w-7xl px-6 lg:px-8">
        <div class="mx-auto max-w-2xl py-20 sm:py-28 lg:py-36">
          <div class="text-center">
            <h1
              class="text-4xl font-semibold tracking-tight text-balance text-white sm:text-6xl"
              style="text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4)"
              x-text="course.title"
            ></h1>
            <p
              class="mt-6 text-lg font-medium text-pretty text-sand-100 sm:text-xl/8"
              style="text-shadow: 0 1px 4px rgba(0, 0, 0, 0.3)"
            >
              Експозиційний курс з вивчення Послання до Римлян
            </p>
          </div>
        </div>
      </div>
    </section>

    <!-- Course introduction -->
    <section class="bg-sand-50">
      <div class="px-6 py-16 sm:py-24 lg:px-8">
        <div class="mx-auto max-w-2xl text-center">
          <p
            class="text-lg/8 text-pretty text-sand-700"
            x-text="course.description"
          ></p>
          <div
            class="mt-10 flex items-center justify-center gap-x-6"
            x-show="course.registrationUrl || course.viberUrl"
          >
            <a
              x-show="course.registrationUrl"
              :href="course.registrationUrl"
              target="_blank"
              rel="noopener noreferrer"
              class="rounded-md bg-sky-blue-600 px-4 py-2.5 text-sm font-semibold text-white shadow-xs hover:bg-sky-blue-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-sky-blue-600"
            >
              Реєстрація
            </a>
            <a
              x-show="course.viberUrl"
              :href="course.viberUrl"
              target="_blank"
              rel="noopener noreferrer"
              class="text-sm/6 font-semibold text-sky-blue-600 hover:text-sky-blue-500"
            >
              Viber-спільнота <span aria-hidden="true">→</span>
            </a>
          </div>
        </div>
      </div>
    </section>

    <!-- Course content -->
    <main class="mx-auto max-w-4xl px-4 py-12 sm:px-6 sm:py-16 lg:px-8">
      <template x-if="loading">
        <p class="text-center text-lg text-sand-500">Завантаження...</p>
      </template>
      <template x-if="!loading">
        <div class="divide-y divide-sand-200">
          <template x-for="(unit, unitIndex) in units" :key="unit.number">
            <div
              :id="'unit-' + unit.number"
              class="scroll-mt-16 py-8 first:pt-0 last:pb-0"
            >
              <dt>
                <button
                  type="button"
                  command="--toggle"
                  :commandfor="'unit-disclosure-' + unit.number"
                  class="flex w-full items-start justify-between text-left text-sand-900"
                >
                  <div>
                    <span
                      class="text-xl font-semibold sm:text-2xl"
                      x-text="'Розділ ' + unit.number + ': ' + unit.title"
                    ></span>
                    <div
                      class="mt-1 flex flex-wrap items-center gap-x-3 text-sm text-sand-500"
                    >
                      <span x-text="unit.passage"></span>
                      <span aria-hidden="true">·</span>
                      <span
                        x-text="unit.lectures.length + ' ' + (unit.lectures.length === 1 ? 'лекція' : unit.lectures.length < 5 ? 'лекції' : 'лекцій')"
                      ></span>
                    </div>
                  </div>
                  <span class="ml-6 flex h-7 items-center">
                    <svg
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="1.5"
                      aria-hidden="true"
                      class="size-6 text-sand-400 in-aria-expanded:hidden"
                    >
                      <path
                        d="M12 6v12m6-6H6"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                    </svg>
                    <svg
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="1.5"
                      aria-hidden="true"
                      class="size-6 text-sand-400 not-in-aria-expanded:hidden"
                    >
                      <path
                        d="M18 12H6"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                    </svg>
                  </span>
                </button>
              </dt>
              <el-disclosure
                :id="'unit-disclosure-' + unit.number"
                :hidden="unitIndex !== units.length - 1 ? true : undefined"
                class="contents"
              >
                <dd class="mt-6 space-y-4">
                  <template
                    x-for="lecture in unit.lectures"
                    :key="lecture.number"
                  >
                    <article
                      :id="'lecture-' + lecture.number"
                      class="scroll-mt-16 rounded-lg border border-sand-200 bg-white p-5 shadow-sm"
                    >
                      <div class="flex items-start justify-between gap-x-4">
                        <div class="min-w-0">
                          <h3
                            class="text-base font-semibold text-sand-900 sm:text-lg"
                            x-text="'Лекція ' + lecture.number + ': ' + lecture.title"
                          ></h3>
                          <div
                            class="mt-1 flex flex-wrap items-center gap-x-2 text-sm text-sand-500"
                          >
                            <time
                              :datetime="lecture.date"
                              x-text="new Intl.DateTimeFormat('uk-UA', { day: 'numeric', month: 'long', year: 'numeric' }).format(new Date(lecture.date + 'T00:00:00'))"
                            ></time>
                            <template x-if="lecture.passage">
                              <span>
                                <span aria-hidden="true">·</span>
                                <span x-text="lecture.passage"></span>
                              </span>
                            </template>
                          </div>
                          <template
                            x-if="lecture.status === 'upcoming'"
                          >
                            <span
                              class="mt-2 inline-block rounded-md bg-sand-100 px-2 py-0.5 text-xs font-medium text-sand-600"
                            >
                              Очікується
                            </span>
                          </template>
                        </div>
                      </div>

                      <!-- Video, handouts, quiz — only for published lectures -->
                      <template
                        x-if="lecture.status !== 'upcoming'"
                      >
                        <div class="mt-4 space-y-3">
                          <!-- Video thumbnail -->
                          <template x-if="lecture.videoUrl">
                            <a
                              :href="lecture.videoUrl"
                              target="_blank"
                              rel="noopener noreferrer"
                              class="group relative block overflow-hidden rounded-md"
                            >
                              <img
                                :src="'https://img.youtube.com/vi/' + (lecture.videoUrl.match(/[?&]v=([^&]+)/) || lecture.videoUrl.match(/youtu\.be\/([^?]+)/) || [,''])[1] + '/mqdefault.jpg'"
                                :alt="'Відео: ' + lecture.title"
                                class="w-full object-cover"
                                loading="lazy"
                              />
                              <div
                                class="absolute inset-0 flex items-center justify-center bg-black/20 group-hover:bg-black/30 transition-colors"
                              >
                                <svg
                                  viewBox="0 0 24 24"
                                  fill="currentColor"
                                  aria-hidden="true"
                                  class="size-12 text-white/90 drop-shadow-lg"
                                >
                                  <path
                                    fill-rule="evenodd"
                                    d="M4.5 5.653c0-1.427 1.529-2.33 2.779-1.643l11.54 6.347c1.295.712 1.295 2.573 0 3.286L7.28 19.99c-1.25.687-2.779-.217-2.779-1.643V5.653Z"
                                    clip-rule="evenodd"
                                  />
                                </svg>
                              </div>
                            </a>
                          </template>

                          <!-- Handouts -->
                          <template x-if="lecture.handouts.length > 0">
                            <div class="space-y-1">
                              <template
                                x-for="handout in lecture.handouts"
                                :key="handout.file"
                              >
                                <a
                                  :href="handout.file"
                                  download
                                  class="flex items-center gap-x-2 rounded-md px-2 py-1.5 text-sm text-sky-blue-600 hover:bg-sand-100 hover:text-sky-blue-500"
                                >
                                  <svg
                                    viewBox="0 0 20 20"
                                    fill="currentColor"
                                    aria-hidden="true"
                                    class="size-4 shrink-0"
                                  >
                                    <path
                                      d="M10.75 2.75a.75.75 0 0 0-1.5 0v8.614L6.295 8.235a.75.75 0 1 0-1.09 1.03l4.25 4.5a.75.75 0 0 0 1.09 0l4.25-4.5a.75.75 0 0 0-1.09-1.03l-2.955 3.129V2.75Z"
                                    />
                                    <path
                                      d="M3.5 12.75a.75.75 0 0 0-1.5 0v2.5A2.75 2.75 0 0 0 4.75 18h10.5A2.75 2.75 0 0 0 18 15.25v-2.5a.75.75 0 0 0-1.5 0v2.5c0 .69-.56 1.25-1.25 1.25H4.75c-.69 0-1.25-.56-1.25-1.25v-2.5Z"
                                    />
                                  </svg>
                                  <span x-text="handout.title"></span>
                                </a>
                              </template>
                            </div>
                          </template>

                          <!-- Quiz -->
                          <template x-if="lecture.quizUrl">
                            <a
                              :href="lecture.quizUrl"
                              target="_blank"
                              rel="noopener noreferrer"
                              class="inline-flex items-center gap-x-2 rounded-md bg-sky-blue-50 px-3 py-1.5 text-sm font-medium text-sky-blue-700 hover:bg-sky-blue-100"
                            >
                              <svg
                                viewBox="0 0 20 20"
                                fill="currentColor"
                                aria-hidden="true"
                                class="size-4 shrink-0"
                              >
                                <path
                                  fill-rule="evenodd"
                                  d="M4.5 2A1.5 1.5 0 0 0 3 3.5v13A1.5 1.5 0 0 0 4.5 18h11a1.5 1.5 0 0 0 1.5-1.5V7.621a1.5 1.5 0 0 0-.44-1.06l-4.12-4.122A1.5 1.5 0 0 0 11.378 2H4.5Zm2.25 8.5a.75.75 0 0 0 0 1.5h6.5a.75.75 0 0 0 0-1.5h-6.5Zm0 3a.75.75 0 0 0 0 1.5h6.5a.75.75 0 0 0 0-1.5h-6.5Z"
                                  clip-rule="evenodd"
                                />
                              </svg>
                              Пройти тест
                            </a>
                          </template>
                        </div>
                      </template>
                    </article>
                  </template>
                </dd>
              </el-disclosure>
            </div>
          </template>
        </div>
      </template>
    </main>

    <!-- Footer -->
    <footer class="bg-sand-100">
      <div
        class="mx-auto max-w-4xl px-6 py-8 text-center text-sm text-sand-500"
      >
        <p>
          <span x-text="course.teacher?.name"></span> ·
          <a
            :href="course.teacher?.organizationUrl"
            target="_blank"
            rel="noopener noreferrer"
            class="text-sky-blue-600 hover:text-sky-blue-500"
            x-text="course.teacher?.organization"
          ></a>
        </p>
        <p class="mt-2">
          Фото:
          <a
            href="https://unsplash.com/photos/ilQmlVIMN4c"
            target="_blank"
            rel="noopener noreferrer"
            class="text-sky-blue-600 hover:text-sky-blue-500"
            >Spencer Davis</a
          >
          /
          <a
            href="https://unsplash.com"
            target="_blank"
            rel="noopener noreferrer"
            class="text-sky-blue-600 hover:text-sky-blue-500"
            >Unsplash</a
          >
        </p>
        <p class="mt-2">
          &copy; 2025 Joshua Steele. Всі права захищені. ·
          <a
            href="https://github.com/joshukraine/romans-course"
            target="_blank"
            rel="noopener noreferrer"
            class="text-sky-blue-600 hover:text-sky-blue-500"
            >GitHub</a
          >
        </p>
      </div>
    </footer>
  </body>
</html>
